
# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/bekasi_complaint_db?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=bekasi-complaint-app-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/images

# Geocoding (Nominatim - OpenStreetMap, free, no API key required)
app.geocoding.base-url=https://nominatim.openstreetmap.org
app.geocoding.user-agent=BekasiComplaintApp/1.0

# Bekasi City Bounding Box (approximate)
app.bekasi.lat.min=-6.3700
app.bekasi.lat.max=-6.1800
app.bekasi.lon.min=106.8700
app.bekasi.lon.max=107.0800

# Seeder
app.seeder.admin.name=Admin Bekasi
app.seeder.admin.email=admin@bekasikota.go.id
app.seeder.admin.password=Admin@2024!
app.seeder.officer.name=Officer Bekasi
app.seeder.officer.email=officer@bekasikota.go.id
app.seeder.officer.password=Officer@2024!

# Logging
logging.level.com.bekasi=DEBUG
