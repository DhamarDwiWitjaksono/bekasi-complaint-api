# Test Profile - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

app.jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits
app.jwt.expiration-ms=86400000

app.upload.dir=uploads/test-images
app.geocoding.base-url=https://nominatim.openstreetmap.org
app.geocoding.user-agent=BekasiComplaintTest/1.0

app.bekasi.lat.min=-6.3700
app.bekasi.lat.max=-6.1800
app.bekasi.lon.min=106.8700
app.bekasi.lon.max=107.0800

app.seeder.admin.name=Test Admin
app.seeder.admin.email=admin@test.com
app.seeder.admin.password=Admin@Test1!
app.seeder.officer.name=Test Officer
app.seeder.officer.email=officer@test.com
app.seeder.officer.password=Officer@Test1!
